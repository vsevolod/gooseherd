# Gooseherd ‚Äî Docker Compose for Coolify deployment
#
# Coolify notes:
#   - ${VAR:?} = required (blocks deploy until set in Coolify UI)
#   - ${VAR:-default} = optional with default
#   - No `ports:` ‚Äî Coolify's Traefik proxy handles external routing + SSL
#   - No `env_file:` ‚Äî Coolify injects env vars via its own mechanism
#
# For local development, create a .env file and run:
#   docker compose --env-file .env up --build

services:
  gooseherd:
    build: .
    environment:
      # ‚îÄ‚îÄ Branding ‚îÄ‚îÄ
      - APP_NAME=${APP_NAME:-Gooseherd}

      # ‚îÄ‚îÄ Required (Slack) ‚îÄ‚îÄ
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:?}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:?}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:?}
      - SLACK_COMMAND_NAME=${SLACK_COMMAND_NAME:-gooseherd}
      - SLACK_ALLOWED_CHANNELS=${SLACK_ALLOWED_CHANNELS:-}

      # ‚îÄ‚îÄ Required (GitHub) ‚îÄ‚îÄ
      - GITHUB_TOKEN=${GITHUB_TOKEN:?}
      - GITHUB_DEFAULT_OWNER=${GITHUB_DEFAULT_OWNER:-}
      - REPO_ALLOWLIST=${REPO_ALLOWLIST:-}

      # ‚îÄ‚îÄ Agent (pi-agent + OpenRouter) ‚îÄ‚îÄ
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AGENT_COMMAND_TEMPLATE=${AGENT_COMMAND_TEMPLATE:?}
      - AGENT_FOLLOW_UP_TEMPLATE=${AGENT_FOLLOW_UP_TEMPLATE:-}
      - AGENT_TIMEOUT_SECONDS=${AGENT_TIMEOUT_SECONDS:-600}

      # ‚îÄ‚îÄ Pipeline ‚îÄ‚îÄ
      - PIPELINE_FILE=${PIPELINE_FILE:-pipelines/pipeline.yml}

      # ‚îÄ‚îÄ Browser Verify ‚îÄ‚îÄ
      - BROWSER_VERIFY_ENABLED=${BROWSER_VERIFY_ENABLED:-false}
      - SCREENSHOT_ENABLED=${SCREENSHOT_ENABLED:-false}
      - BROWSER_VERIFY_MODEL=${BROWSER_VERIFY_MODEL:-}
      - BROWSER_VERIFY_EXECUTION_MODEL=${BROWSER_VERIFY_EXECUTION_MODEL:-}
      - BROWSER_VERIFY_MAX_STEPS=${BROWSER_VERIFY_MAX_STEPS:-15}
      - REVIEW_APP_URL_PATTERN=${REVIEW_APP_URL_PATTERN:-}

      # ‚îÄ‚îÄ Orchestrator ‚îÄ‚îÄ
      - ORCHESTRATOR_ENABLED=${ORCHESTRATOR_ENABLED:-false}
      - ORCHESTRATOR_MODEL=${ORCHESTRATOR_MODEL:-}
      - ORCHESTRATOR_TIMEOUT_MS=${ORCHESTRATOR_TIMEOUT_MS:-60000}
      - ORCHESTRATOR_WALL_CLOCK_TIMEOUT_MS=${ORCHESTRATOR_WALL_CLOCK_TIMEOUT_MS:-180000}

      # ‚îÄ‚îÄ Validation ‚îÄ‚îÄ
      - VALIDATION_COMMAND=${VALIDATION_COMMAND:-}
      - LINT_FIX_COMMAND=${LINT_FIX_COMMAND:-}
      - LOCAL_TEST_COMMAND=${LOCAL_TEST_COMMAND:-}
      - MAX_VALIDATION_ROUNDS=${MAX_VALIDATION_ROUNDS:-2}

      # ‚îÄ‚îÄ Runtime ‚îÄ‚îÄ
      - RUNNER_CONCURRENCY=${RUNNER_CONCURRENCY:-1}
      - WORK_ROOT=${WORK_ROOT:-.work}
      - DATA_DIR=${DATA_DIR:-data}
      - DRY_RUN=${DRY_RUN:-false}

      # ‚îÄ‚îÄ Git identity ‚îÄ‚îÄ
      - BRANCH_PREFIX=${BRANCH_PREFIX:-gooseherd}
      - DEFAULT_BASE_BRANCH=${DEFAULT_BASE_BRANCH:-main}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Gooseherd Bot}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-gooseherd-bot@local}

      # ‚îÄ‚îÄ Dashboard ‚îÄ‚îÄ
      - DASHBOARD_ENABLED=${DASHBOARD_ENABLED:-true}
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8787}
      - DASHBOARD_PUBLIC_URL=${DASHBOARD_PUBLIC_URL:-}
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN:-}

      # ‚îÄ‚îÄ Slack UX ‚îÄ‚îÄ
      - SLACK_PROGRESS_HEARTBEAT_SECONDS=${SLACK_PROGRESS_HEARTBEAT_SECONDS:-20}
      - MAX_TASK_CHARS=${MAX_TASK_CHARS:-4000}
      - TEAM_CHANNEL_MAP=${TEAM_CHANNEL_MAP:-}

      # ‚îÄ‚îÄ LLM (shared default for all LLM features, individual overrides optional) ‚îÄ‚îÄ
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-}
      - PLAN_TASK_MODEL=${PLAN_TASK_MODEL:-}
      - SCOPE_JUDGE_ENABLED=${SCOPE_JUDGE_ENABLED:-false}
      - SCOPE_JUDGE_MODEL=${SCOPE_JUDGE_MODEL:-}
      - SCOPE_JUDGE_MIN_PASS_SCORE=${SCOPE_JUDGE_MIN_PASS_SCORE:-60}

      # ‚îÄ‚îÄ Workspace Cleanup ‚îÄ‚îÄ
      - WORKSPACE_CLEANUP_ENABLED=${WORKSPACE_CLEANUP_ENABLED:-true}
      - WORKSPACE_MAX_AGE_HOURS=${WORKSPACE_MAX_AGE_HOURS:-24}
      - WORKSPACE_CLEANUP_INTERVAL_MINUTES=${WORKSPACE_CLEANUP_INTERVAL_MINUTES:-30}

      # ‚îÄ‚îÄ CEMS Memory (optional) ‚îÄ‚îÄ
      - CEMS_ENABLED=${CEMS_ENABLED:-false}
      - CEMS_API_URL=${CEMS_API_URL:-}
      - CEMS_API_KEY=${CEMS_API_KEY:-}
      - CEMS_TEAM_ID=${CEMS_TEAM_ID:-}

      # ‚îÄ‚îÄ Pi-Agent Extensions ‚îÄ‚îÄ
      - PI_AGENT_EXTENSIONS=${PI_AGENT_EXTENSIONS:-}
      - MCP_EXTENSIONS=${MCP_EXTENSIONS:-}

      # ‚îÄ‚îÄ OpenRouter Provider Routing (JSON, e.g. {"ignore":["DeepInfra"]}) ‚îÄ‚îÄ
      - OPENROUTER_PROVIDER_PREFERENCES=${OPENROUTER_PROVIDER_PREFERENCES:-}

      # ‚îÄ‚îÄ Run Supervisor (auto-retry + watchdog) ‚îÄ‚îÄ
      - SUPERVISOR_ENABLED=${SUPERVISOR_ENABLED:-true}
      - SUPERVISOR_RUN_TIMEOUT_SECONDS=${SUPERVISOR_RUN_TIMEOUT_SECONDS:-7200}
      - SUPERVISOR_NODE_STALE_SECONDS=${SUPERVISOR_NODE_STALE_SECONDS:-1800}
      - SUPERVISOR_WATCHDOG_INTERVAL_SECONDS=${SUPERVISOR_WATCHDOG_INTERVAL_SECONDS:-30}
      - SUPERVISOR_MAX_AUTO_RETRIES=${SUPERVISOR_MAX_AUTO_RETRIES:-1}
      - SUPERVISOR_RETRY_COOLDOWN_SECONDS=${SUPERVISOR_RETRY_COOLDOWN_SECONDS:-60}
      - SUPERVISOR_MAX_RETRIES_PER_DAY=${SUPERVISOR_MAX_RETRIES_PER_DAY:-20}

      # ‚îÄ‚îÄ Sandbox (Docker-out-of-Docker) ‚îÄ‚îÄ
      - SANDBOX_ENABLED=${SANDBOX_ENABLED:-false}
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-gooseherd/sandbox:default}
      - SANDBOX_HOST_WORK_PATH=${SANDBOX_HOST_WORK_PATH:-}
      - SANDBOX_CPUS=${SANDBOX_CPUS:-2}
      - SANDBOX_MEMORY_MB=${SANDBOX_MEMORY_MB:-4096}

    volumes:
      # When SANDBOX_ENABLED=true, use bind mount so sandbox containers can share the path:
      #   SANDBOX_HOST_WORK_PATH=/data/gooseherd/work ‚Üí /data/gooseherd/work:/app/.work
      # When SANDBOX_ENABLED=false, named volume is fine (default):
      - ${SANDBOX_HOST_WORK_PATH:-gooseherd-work}:/app/.work
      - gooseherd-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-out-of-Docker for sandbox containers
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # ‚îÄ‚îÄ Traefik basic auth (uncomment and set your credentials) ‚îÄ‚îÄ
    # Generate: htpasswd -nbB admin yourpassword
    # Double $$ signs in YAML to escape bcrypt hashes
    # labels:
    #   - 'traefik.http.middlewares.gooseherd-auth.basicauth.users=admin:$$2y$$05$$HASH_HERE'

volumes:
  gooseherd-work:
  gooseherd-data:
