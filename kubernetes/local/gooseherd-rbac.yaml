apiVersion: v1
kind: ServiceAccount
metadata:
  name: gooseherd
  namespace: gooseherd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gooseherd-runtime
  namespace: gooseherd
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gooseherd-runtime
  namespace: gooseherd
subjects:
  - kind: ServiceAccount
    name: gooseherd
    namespace: gooseherd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gooseherd-runtime
