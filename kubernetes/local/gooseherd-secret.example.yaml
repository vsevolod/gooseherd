apiVersion: v1
kind: Secret
metadata:
  name: gooseherd-env
  namespace: gooseherd
type: Opaque
stringData:
  DATABASE_URL: postgres://gooseherd:gooseherd@postgres.gooseherd.svc.cluster.local:5432/gooseherd
  ENCRYPTION_KEY: replace-with-64-char-hex
  GITHUB_TOKEN: replace-with-github-token
  OPENROUTER_API_KEY: replace-with-openrouter-key
