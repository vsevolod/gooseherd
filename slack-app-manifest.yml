# Slack App Manifest for Gooseherd
# Import this file at https://api.slack.com/apps → "Create New App" → "From an app manifest"
#
# After import:
#   1. Install the app to your workspace
#   2. Copy the Bot User OAuth Token → SLACK_BOT_TOKEN
#   3. Copy the App-Level Token (connections:write) → SLACK_APP_TOKEN
#   4. Copy the Signing Secret → SLACK_SIGNING_SECRET

display_information:
  name: Gooseherd
  description: AI-powered code agent that fixes bugs and ships features from Slack
  background_color: "#1a1a2e"

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: false
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Gooseherd
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - chat:write.customize
      - files:write
      - reactions:read
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
