version: 1
name: "pipeline"
description: "Unified pipeline — all nodes, orchestrator controls via skipNodes/enableNodes"

context:
  max_validation_rounds: 2

nodes:
  - id: clone
    type: deterministic
    action: clone

  - id: setup_sandbox
    type: deterministic
    action: setup_sandbox
    if: "config.sandboxEnabled"

  - id: classify_task
    type: deterministic
    action: classify_task

  - id: generate_title
    type: deterministic
    action: generate_title
    on_soft_fail: warn

  - id: plan_task
    type: agentic
    action: plan_task
    enabled: false

  - id: hydrate
    type: deterministic
    action: hydrate_context

  - id: implement
    type: agentic
    action: implement

  - id: lint_fix
    type: deterministic
    action: lint_fix
    if: "config.lintFixCommand != ''"

  - id: validate
    type: deterministic
    action: validate
    if: "config.validationCommand != ''"
    on_failure:
      action: loop
      agent_node: fix_validation
      max_rounds: 2
      until: "validate.exit_code == 0"

  - id: local_test
    type: deterministic
    action: local_test
    if: "config.localTestCommand != ''"
    on_failure:
      action: loop
      agent_node: fix_validation
      max_rounds: 2
      until: "local_test.exit_code == 0"

  - id: lightweight_checks
    type: deterministic
    action: lightweight_checks
    on_failure:
      action: loop
      agent_node: fix_validation
      max_rounds: 2

  # Quality gates — run after validation, before commit
  - id: diff_gate
    type: conditional
    action: diff_gate
    on_soft_fail: warn

  - id: forbidden_files
    type: conditional
    action: forbidden_files
    on_soft_fail: warn

  - id: security_scan
    type: deterministic
    action: security_scan

  - id: scope_judge
    type: agentic
    action: scope_judge
    enabled: false
    on_soft_fail: warn

  - id: commit
    type: deterministic
    action: commit

  - id: push
    type: deterministic
    action: push

  - id: create_pr
    type: deterministic
    action: create_pr

  # Summarize what the agent changed for richer browser_verify context
  - id: summarize_changes
    type: deterministic
    action: summarize_changes
    enabled: false
    on_soft_fail: warn

  # Deploy and screenshot the preview
  # Configure REVIEW_APP_URL_PATTERN env var for url_pattern strategy.
  - id: deploy_preview
    type: deterministic
    action: deploy_preview
    enabled: false
    on_soft_fail: warn
    config:
      strategy: url_pattern
      readiness_timeout_seconds: 300
      max_timeout_seconds: 1800
      readiness_poll_interval_seconds: 5

  - id: browser_verify
    type: deterministic
    action: browser_verify
    enabled: false
    on_failure:
      action: loop
      agent_node: fix_browser
      max_rounds: 2
      on_exhausted: complete_with_warning

  # Mid-pipeline intelligence: decide whether to skip remaining nodes based on state
  - id: decide_recovery
    type: conditional
    action: decide_next_step
    enabled: false
    if: "ctx.browserVerifyFailureCode"
    config:
      model: z-ai/glm-5
      fallback_model: openai/gpt-4.1-mini
      context_keys:
        - browserVerifyFailureCode
        - browserVerifyVerdictReason
        - browserVerifyAuthSignals
        - browserVerifyDomFindings
        - browserVerifyFailureHistory
        - changedFiles
      available_actions:
        - fix_browser
        - browser_verify
        - implement

  # CI feedback loop — runs before screenshot upload to avoid stale commitSha
  - id: wait_ci
    type: async
    action: wait_ci
    on_failure:
      action: loop
      agent_node: fix_ci
      max_rounds: 2
      on_exhausted: complete_with_warning

  # Upload screenshot to PR (runs after wait_ci to avoid push conflicts)
  - id: upload_screenshot
    type: deterministic
    action: upload_screenshot
    enabled: false
    on_soft_fail: warn

  - id: notify
    type: deterministic
    action: notify
