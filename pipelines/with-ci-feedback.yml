version: 1
name: "with-ci-feedback"
description: "Pipeline with quality gates AND CI feedback loop: waits for CI, fixes failures"

context:
  max_validation_rounds: 2

nodes:
  - id: clone
    type: deterministic
    action: clone

  - id: classify_task
    type: deterministic
    action: classify_task

  - id: generate_title
    type: deterministic
    action: generate_title
    on_soft_fail: warn

  - id: hydrate
    type: deterministic
    action: hydrate_context

  - id: implement
    type: agentic
    action: implement

  - id: lint_fix
    type: deterministic
    action: lint_fix
    if: "config.lintFixCommand != ''"

  - id: validate
    type: deterministic
    action: validate
    if: "config.validationCommand != ''"
    on_failure:
      action: loop
      agent_node: fix_validation
      max_rounds: 2
      until: "validate.exit_code == 0"

  # Quality gates — run after validation, before commit
  - id: diff_gate
    type: conditional
    action: diff_gate
    on_soft_fail: warn

  - id: forbidden_files
    type: conditional
    action: forbidden_files
    on_soft_fail: warn

  - id: security_scan
    type: deterministic
    action: security_scan

  - id: commit
    type: deterministic
    action: commit

  - id: push
    type: deterministic
    action: push

  - id: create_pr
    type: deterministic
    action: create_pr

  # CI feedback loop — wait for CI, fix if needed
  - id: wait_ci
    type: async
    action: wait_ci
    on_failure:
      action: loop
      agent_node: fix_ci
      max_rounds: 2
      on_exhausted: complete_with_warning

  - id: notify
    type: deterministic
    action: notify
