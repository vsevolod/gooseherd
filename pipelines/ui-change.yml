version: 1
name: "ui-change"
description: "Full pipeline with deploy preview and browser verification for UI changes."

context:
  max_validation_rounds: 2

nodes:
  - id: clone
    type: deterministic
    action: clone

  - id: setup_sandbox
    type: deterministic
    action: setup_sandbox
    if: "config.sandboxEnabled"

  - id: classify_task
    type: deterministic
    action: classify_task

  - id: generate_title
    type: deterministic
    action: generate_title
    on_soft_fail: warn

  - id: hydrate
    type: deterministic
    action: hydrate_context

  - id: implement
    type: agentic
    action: implement

  - id: lint_fix
    type: deterministic
    action: lint_fix
    if: "config.lintFixCommand != ''"

  - id: validate
    type: deterministic
    action: validate
    if: "config.validationCommand != ''"
    on_failure:
      action: loop
      agent_node: fix_validation
      max_rounds: 2
      until: "validate.exit_code == 0"

  - id: diff_gate
    type: conditional
    action: diff_gate
    on_soft_fail: warn

  - id: forbidden_files
    type: conditional
    action: forbidden_files
    on_soft_fail: warn

  - id: security_scan
    type: deterministic
    action: security_scan

  - id: commit
    type: deterministic
    action: commit

  - id: push
    type: deterministic
    action: push

  - id: create_pr
    type: deterministic
    action: create_pr

  - id: summarize_changes
    type: deterministic
    action: summarize_changes
    on_soft_fail: warn

  - id: deploy_preview
    type: deterministic
    action: deploy_preview
    on_soft_fail: warn
    config:
      strategy: url_pattern
      readiness_timeout_seconds: 300
      max_timeout_seconds: 1800
      readiness_poll_interval_seconds: 5

  - id: browser_verify
    type: deterministic
    action: browser_verify
    on_failure:
      action: loop
      agent_node: fix_browser
      max_rounds: 2
      on_exhausted: complete_with_warning

  - id: decide_recovery
    type: conditional
    action: decide_next_step
    if: "ctx.browserVerifyFailureCode"
    config:
      context_keys:
        - browserVerifyFailureCode
        - browserVerifyVerdictReason
        - browserVerifyAuthSignals
        - browserVerifyDomFindings
        - browserVerifyFailureHistory
        - changedFiles
      available_actions:
        - fix_browser
        - browser_verify
        - implement

  - id: wait_ci
    type: async
    action: wait_ci
    on_failure:
      action: loop
      agent_node: fix_ci
      max_rounds: 2
      on_exhausted: complete_with_warning

  - id: notify
    type: deterministic
    action: notify
