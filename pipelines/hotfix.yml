version: 1
name: "hotfix"
description: "Minimal pipeline for urgent fixes. No quality gates, no CI wait, no browser verification."

nodes:
  - id: clone
    type: deterministic
    action: clone

  - id: generate_title
    type: deterministic
    action: generate_title
    on_soft_fail: warn

  - id: hydrate
    type: deterministic
    action: hydrate_context

  - id: implement
    type: agentic
    action: implement

  - id: lint_fix
    type: deterministic
    action: lint_fix
    if: "config.lintFixCommand != ''"

  - id: commit
    type: deterministic
    action: commit

  - id: push
    type: deterministic
    action: push

  - id: create_pr
    type: deterministic
    action: create_pr

  - id: notify
    type: deterministic
    action: notify
