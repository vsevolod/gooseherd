version: 1
name: "full"
description: "Full pipeline with quality gates, CI feedback, scope judge, and browser verification"

context:
  max_validation_rounds: 2

nodes:
  - id: clone
    type: deterministic
    action: clone

  - id: classify_task
    type: deterministic
    action: classify_task

  - id: generate_title
    type: deterministic
    action: generate_title
    on_soft_fail: warn

  - id: plan_task
    type: agentic
    action: plan_task

  - id: hydrate
    type: deterministic
    action: hydrate_context

  - id: implement
    type: agentic
    action: implement

  - id: lint_fix
    type: deterministic
    action: lint_fix
    if: "config.lintFixCommand != ''"

  - id: validate
    type: deterministic
    action: validate
    if: "config.validationCommand != ''"
    on_failure:
      action: loop
      agent_node: fix_validation
      max_rounds: 2
      until: "validate.exit_code == 0"

  - id: local_test
    type: deterministic
    action: local_test
    if: "config.localTestCommand != ''"
    on_failure:
      action: loop
      agent_node: fix_validation
      max_rounds: 2
      until: "local_test.exit_code == 0"

  # Quality gates — run after validation, before commit
  - id: diff_gate
    type: conditional
    action: diff_gate
    on_soft_fail: warn

  - id: forbidden_files
    type: conditional
    action: forbidden_files
    on_soft_fail: warn

  - id: security_scan
    type: deterministic
    action: security_scan

  # Scope judge — LLM-as-judge compares diff vs task (opt-in)
  - id: scope_judge
    type: agentic
    action: scope_judge
    enabled: false
    on_soft_fail: warn

  - id: commit
    type: deterministic
    action: commit

  - id: push
    type: deterministic
    action: push

  - id: create_pr
    type: deterministic
    action: create_pr

  # CI feedback loop — wait for CI, fix if needed
  - id: wait_ci
    type: async
    action: wait_ci
    on_failure:
      action: loop
      agent_node: fix_ci
      max_rounds: 2
      on_exhausted: complete_with_warning

  # Deploy preview — trigger deployment and wait for URL
  # Configure strategy in config block. See docs/research-deploy-preview.md for options.
  - id: deploy_preview
    type: deterministic
    action: deploy_preview
    enabled: false
    on_soft_fail: warn
    config:
      strategy: url_pattern
      url_pattern: "https://{{prNumber}}.preview.example.com"
      readiness_timeout_seconds: 300

  # Browser verification — smoke test + accessibility (opt-in)
  - id: browser_verify
    type: agentic
    action: browser_verify
    enabled: false
    on_soft_fail: warn

  # Upload screenshot to PR (runs after browser_verify captures it)
  - id: upload_screenshot
    type: deterministic
    action: upload_screenshot
    on_soft_fail: warn

  - id: notify
    type: deterministic
    action: notify
